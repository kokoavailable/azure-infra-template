name: Platform bootstrap CI

on:
  pull_request:
    paths:
      - "platform/**"
      - "stacks/_stack-template/**"
      - "scripts/bootstrap/**"
      - ".github/workflows/platform-bootstrap-ci.yml"
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: platform-bootstrap-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.9"
          terraform_wrapper: false

      - name: terraform fmt (check)
        run: terraform fmt -check -recursive

      - name: terraform validate (bootstrap stacks)
        run: |
          set -euo pipefail
          for d in \
            platform/identity/02-identity-federation \
            platform/management/03-policy-governance \
            stacks/_stack-template
          do
            echo "==> $d"
            (cd "$d" && terraform init -backend=false -input=false && terraform validate)
          done

  # Proves GitHub Actions OIDC to Azure. Configure repo secrets first; run manually.
  oidc-azure-smoke:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify context
        run: az account show --output table
